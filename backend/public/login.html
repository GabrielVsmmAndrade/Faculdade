<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PanicIoT — Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="logo-main">PANIC<span>IOT</span></div>
      <div class="logo-desc">Sistema de Resposta a Emergências</div>
    </div>
    <div class="login-error" id="err"></div>
    <div class="form-group">
      <label class="form-label">Usuário</label>
      <input class="form-control" type="text" id="username" placeholder="seu.usuario" autocomplete="username">
    </div>
    <div class="form-group">
      <label class="form-label">Senha</label>
      <input class="form-control" type="password" id="password" placeholder="••••••" autocomplete="current-password">
    </div>
    <button class="login-btn" id="btn-login">ENTRAR</button>
  </div>
</div>

<script src="/js/api.js"></script>
<script>
  // Se já autenticado, redireciona
  if (API.getToken()) window.location.href = "/dashboard.html";

  const btnLogin = document.getElementById("btn-login");
  const errDiv   = document.getElementById("err");

  async function doLogin() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    if (!username || !password) { showErr("Preencha usuário e senha."); return; }

    btnLogin.disabled = true;
    btnLogin.textContent = "AUTENTICANDO...";
    errDiv.classList.remove("show");

    try {
      await API.login(username, password);
      window.location.href = "/dashboard.html";
    } catch (e) {
      showErr(e.message);
      btnLogin.disabled = false;
      btnLogin.textContent = "ENTRAR";
    }
  }

  function showErr(msg) {
    errDiv.textContent = msg;
    errDiv.classList.add("show");
  }

  btnLogin.addEventListener("click", doLogin);
  document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
</script>
</body>
</html>
