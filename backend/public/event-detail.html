<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>PanicIoT — Detalhe</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 24px; margin-bottom: 20px; }
    .detail-item .dt { font-size: 10px; color: var(--t3); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 4px; }
    .detail-item .dd { font-size: 14px; color: var(--t1); }
    .action-item { display: flex; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .action-item:last-child { border-bottom: none; }
    .action-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; }
    .action-dot.ack { background: var(--yellow); }
    .action-dot.encerrar { background: var(--green); }
  </style>
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <span class="topbar-title">PANICIOT / <a href="/events.html" style="color:var(--t2)">Ocorrências</a> / <span id="topbar-id">—</span></span>
      <div class="topbar-right">
        <div class="gap-2" id="action-btns"></div>
      </div>
    </div>
    <div class="content">
      <div id="main-content"><div class="loading">Carregando...</div></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Registrar Ação</div>
    <div class="form-group">
      <label class="form-label">Operador</label>
      <input class="form-control" id="m-operator">
    </div>
    <div class="form-group">
      <label class="form-label">Comentário (opcional)</label>
      <input class="form-control" id="m-comment">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="m-confirm">Confirmar</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
Nav.init("events");

const id = new URLSearchParams(location.search).get("id");
let event = null, modalAction = null;

async function load() {
  if (!id) { document.getElementById("main-content").innerHTML = '<div class="empty-state">ID inválido</div>'; return; }
  const data = await API.get(`/events/${id}`);
  if (!data || data.error) { document.getElementById("main-content").innerHTML = '<div class="empty-state">Ocorrência não encontrada</div>'; return; }
  event = data;
  render();
}

function render() {
  document.getElementById("topbar-id").textContent = `#${event.id}`;

  // Botões de ação no topbar
  const btns = document.getElementById("action-btns");
  btns.innerHTML = "";
  if (event.status === "ABERTO") {
    const b = document.createElement("button");
    b.className = "btn btn-warning"; b.textContent = "⚡ ACK";
    b.onclick = () => openModal("ack");
    btns.appendChild(b);
  }
  if (event.status !== "ENCERRADO") {
    const b = document.createElement("button");
    b.className = "btn btn-success"; b.textContent = "✓ Encerrar";
    b.onclick = () => openModal("close");
    btns.appendChild(b);
  }

  const actionsHtml = (event.actions || []).length
    ? event.actions.map(a => `
        <div class="action-item">
          <div class="action-dot ${a.action.toLowerCase()}"></div>
          <div>
            <div style="font-weight:600;font-size:13px">${a.action} — ${a.operator_name}</div>
            <div style="font-size:12px;color:var(--t2);margin-top:3px">${a.comment || "Sem comentário"}</div>
            <div style="font-size:11px;color:var(--t3);margin-top:2px">${fmtDate(a.action_at)}</div>
          </div>
        </div>`).join("")
    : '<div class="empty-state">Nenhuma ação registrada</div>';

  document.getElementById("main-content").innerHTML = `
    <div class="card mb-16">
      <div class="section-header">
        <div class="gap-2">
          ${levelBadge(event.level)} ${statusBadge(event.status)}
        </div>
        <span class="mono text-muted" style="font-size:12px">${event.event_uid}</span>
      </div>
      <div class="detail-grid">
        <div class="detail-item"><div class="dt">Dispositivo</div><div class="dd">${event.device_uid} — ${event.device_name}</div></div>
        <div class="detail-item"><div class="dt">Local</div><div class="dd">${event.location || "—"}</div></div>
        <div class="detail-item"><div class="dt">Ocorrência em</div><div class="dd mono">${fmtDate(event.occurred_at)}</div></div>
        <div class="detail-item"><div class="dt">Recebido em</div><div class="dd mono">${fmtDate(event.received_at)}</div></div>
        <div class="detail-item"><div class="dt">Rede Wi-Fi</div><div class="dd">${event.wifi_hint || "—"}</div></div>
        <div class="detail-item"><div class="dt">Notas</div><div class="dd">${event.notes || "—"}</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Histórico de Ações</div>
      ${actionsHtml}
    </div>`;
}

function openModal(action) {
  modalAction = action;
  document.getElementById("modal-title").textContent = action === "ack" ? "Reconhecer Ocorrência" : "Encerrar Ocorrência";
  document.getElementById("m-operator").value = API.getUser()?.full_name || "";
  document.getElementById("m-comment").value = "";
  document.getElementById("modal").classList.add("open");
}
function closeModal() { document.getElementById("modal").classList.remove("open"); }

document.getElementById("m-confirm").addEventListener("click", async () => {
  const operator = document.getElementById("m-operator").value.trim();
  const comment  = document.getElementById("m-comment").value.trim();
  if (!operator) { toast("Informe o nome do operador", "error"); return; }
  const btn = document.getElementById("m-confirm");
  btn.disabled = true; btn.textContent = "Aguarde...";
  const res = await API.post(`/events/${id}/${modalAction}`, { operator_name: operator, comment });
  btn.disabled = false; btn.textContent = "Confirmar";
  closeModal();
  if (res?.ok) { toast("Status atualizado!", "success"); load(); }
  else toast(res?.error || "Erro", "error");
});

load();
</script>
</body>
</html>
