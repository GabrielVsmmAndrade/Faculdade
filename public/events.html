<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>PanicIoT — Ocorrências</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <span class="topbar-title">PANICIOT / <span>Ocorrências</span></span>
      <div class="topbar-right">
        <span class="badge-live">SISTEMA ONLINE</span>
        <span class="poll-indicator" id="poll-info">Polling a cada 5s</span>
      </div>
    </div>
    <div class="content">
      <div class="card">
        <!-- Filtros -->
        <div class="filters">
          <div class="form-group">
            <label class="form-label">Status</label>
            <select class="form-control" id="f-status">
              <option value="">Todos</option>
              <option value="ABERTO">Aberto</option>
              <option value="ACK">ACK</option>
              <option value="ENCERRADO">Encerrado</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Dispositivo</label>
            <input class="form-control" id="f-device" placeholder="ex: esp32-01">
          </div>
          <button class="btn btn-secondary" onclick="load()">🔍 Filtrar</button>
          <button class="btn btn-ghost" onclick="clearFilters()">Limpar</button>
        </div>
        <div class="divider"></div>
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>ID</th><th>Event UID</th><th>Dispositivo</th><th>Nível</th>
              <th>Status</th><th>Data/Hora</th><th>Local</th><th>Ações</th>
            </tr></thead>
            <tbody id="tbody"><tr><td colspan="8" class="loading">Carregando...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal ACK/Close -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Registrar Ação</div>
    <div class="form-group">
      <label class="form-label">Operador</label>
      <input class="form-control" id="m-operator" placeholder="Seu nome completo">
    </div>
    <div class="form-group">
      <label class="form-label">Comentário (opcional)</label>
      <input class="form-control" id="m-comment" placeholder="Observações...">
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="m-confirm">Confirmar</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
Nav.init("events");

let events = [];

async function load() {
  const status = document.getElementById("f-status").value;
  const device = document.getElementById("f-device").value.trim();
  let qs = "";
  if (status) qs += `?status=${status}`;
  if (device) qs += (qs ? "&" : "?") + `device_uid=${device}`;

  const data = await API.get("/events" + qs);
  if (!data) return;
  events = data;
  render();
  document.getElementById("poll-info").textContent = "Atualizado " + new Date().toLocaleTimeString("pt-BR");
}

function render() {
  const tbody = document.getElementById("tbody");
  if (!events.length) {
    tbody.innerHTML = '<tr><td colspan="8" class="empty-state">Nenhuma ocorrência encontrada</td></tr>';
    return;
  }
  tbody.innerHTML = events.map(e => `
    <tr>
      <td class="mono">#${e.id}</td>
      <td class="mono" style="font-size:11px">${e.event_uid}</td>
      <td>${e.device_uid}</td>
      <td>${levelBadge(e.level)}</td>
      <td>${statusBadge(e.status)}</td>
      <td class="mono">${fmtDate(e.occurred_at)}</td>
      <td>${e.location || "—"}</td>
      <td>
        <div class="gap-2">
          <button class="btn btn-ghost btn-sm" onclick="location.href='/event-detail.html?id=${e.id}'">Ver</button>
          ${e.status === "ABERTO"    ? `<button class="btn btn-warning btn-sm" onclick="openModal(${e.id},'ack')">ACK</button>` : ""}
          ${e.status !== "ENCERRADO" ? `<button class="btn btn-success btn-sm" onclick="openModal(${e.id},'close')">Encerrar</button>` : ""}
        </div>
      </td>
    </tr>`).join("");
}

function clearFilters() {
  document.getElementById("f-status").value = "";
  document.getElementById("f-device").value = "";
  load();
}

// Modal
let modalEventId = null, modalAction = null;

function openModal(id, action) {
  modalEventId = id; modalAction = action;
  document.getElementById("modal-title").textContent = action === "ack" ? "Reconhecer Ocorrência" : "Encerrar Ocorrência";
  document.getElementById("m-operator").value = (API.getUser()?.full_name || "");
  document.getElementById("m-comment").value  = "";
  document.getElementById("modal").classList.add("open");
}
function closeModal() { document.getElementById("modal").classList.remove("open"); }

document.getElementById("m-confirm").addEventListener("click", async () => {
  const operator = document.getElementById("m-operator").value.trim();
  const comment  = document.getElementById("m-comment").value.trim();
  if (!operator) { toast("Informe o nome do operador", "error"); return; }

  const btn = document.getElementById("m-confirm");
  btn.disabled = true; btn.textContent = "Aguarde...";

  const res = await API.post(`/events/${modalEventId}/${modalAction}`, { operator_name: operator, comment });
  btn.disabled = false; btn.textContent = "Confirmar";
  closeModal();

  if (res?.ok) {
    toast(`Ocorrência #${modalEventId} atualizada: ${res.status}`, "success");
    load();
  } else {
    toast(res?.error || "Erro ao atualizar", "error");
  }
});

load();
setInterval(load, 5000);
</script>
</body>
</html>
