<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>PanicIoT — Usuários</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="shell">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main">
    <div class="topbar">
      <span class="topbar-title">PANICIOT / <span>Usuários</span></span>
      <div class="topbar-right">
        <button class="btn btn-primary btn-sm" onclick="openNew()">+ Novo Usuário</button>
      </div>
    </div>
    <div class="content">
      <div class="card">
        <div class="table-wrap">
          <table>
            <thead><tr>
              <th>ID</th><th>Usuário</th><th>Nome</th><th>E-mail</th>
              <th>Perfil</th><th>Ativo</th><th>Cadastro</th><th>Ações</th>
            </tr></thead>
            <tbody id="tbody"><tr><td colspan="8" class="loading">Carregando...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal criar/editar -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Novo Usuário</div>
    <input type="hidden" id="m-id">
    <div class="detail-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="form-group" style="margin:0">
        <label class="form-label">Usuário *</label>
        <input class="form-control" id="m-username" placeholder="usuario">
      </div>
      <div class="form-group" style="margin:0">
        <label class="form-label">Perfil *</label>
        <select class="form-control" id="m-role">
          <option value="OPERADOR">Operador</option>
          <option value="ADMIN">Admin</option>
        </select>
      </div>
    </div>
    <div class="form-group mt-16">
      <label class="form-label">Nome Completo *</label>
      <input class="form-control" id="m-fullname" placeholder="Nome Sobrenome">
    </div>
    <div class="form-group">
      <label class="form-label">E-mail *</label>
      <input class="form-control" id="m-email" type="email" placeholder="email@exemplo.com">
    </div>
    <div class="form-group" id="pw-group">
      <label class="form-label">Senha *</label>
      <input class="form-control" id="m-password" type="password" placeholder="Mínimo 6 caracteres">
    </div>
    <div id="pw-edit-note" style="display:none;font-size:11px;color:var(--t3);margin-bottom:12px">
      Deixe em branco para manter a senha atual.
    </div>
    <div class="form-group" id="active-group" style="display:none">
      <label class="form-label">Ativo</label>
      <select class="form-control" id="m-active">
        <option value="1">Sim</option>
        <option value="0">Não</option>
      </select>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" id="m-confirm">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal confirmar exclusão -->
<div class="modal-overlay" id="modal-del">
  <div class="modal">
    <div class="modal-title">Excluir Usuário</div>
    <p style="color:var(--t2);margin-bottom:20px">Tem certeza que deseja excluir este usuário? Esta ação não pode ser desfeita.</p>
    <input type="hidden" id="del-id">
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="document.getElementById('modal-del').classList.remove('open')">Cancelar</button>
      <button class="btn btn-danger" id="del-confirm">Excluir</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script>
Nav.init("users");
const currentUser = API.getUser();
let editMode = false;

async function load() {
  const users = await API.get("/users");
  if (!users) return;
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = users.map(u => `
    <tr>
      <td class="mono">#${u.id}</td>
      <td class="mono">${u.username}</td>
      <td>${u.full_name}</td>
      <td>${u.email}</td>
      <td><span class="badge ${u.role === 'ADMIN' ? 'badge-alto' : 'badge-blue'}">${u.role}</span></td>
      <td><span class="badge ${u.active ? 'badge-online' : 'badge-offline'}">${u.active ? 'Sim' : 'Não'}</span></td>
      <td class="mono">${fmtDateShort(u.created_at)}</td>
      <td>
        <div class="gap-2">
          <button class="btn btn-ghost btn-sm" onclick="openEdit(${u.id})">Editar</button>
          ${u.id !== currentUser?.id
            ? `<button class="btn btn-danger btn-sm" onclick="confirmDelete(${u.id})">Excluir</button>`
            : '<span class="text-muted" style="font-size:11px">Você</span>'}
        </div>
      </td>
    </tr>`).join("");
}

function openNew() {
  editMode = false;
  document.getElementById("modal-title").textContent = "Novo Usuário";
  document.getElementById("m-id").value = "";
  document.getElementById("m-username").value = "";
  document.getElementById("m-fullname").value = "";
  document.getElementById("m-email").value = "";
  document.getElementById("m-password").value = "";
  document.getElementById("m-role").value = "OPERADOR";
  document.getElementById("m-username").disabled = false;
  document.getElementById("pw-group").style.display = "block";
  document.getElementById("pw-edit-note").style.display = "none";
  document.getElementById("active-group").style.display = "none";
  document.getElementById("modal").classList.add("open");
}

async function openEdit(id) {
  editMode = true;
  const users = await API.get("/users");
  const u = users?.find(x => x.id === id);
  if (!u) return;
  document.getElementById("modal-title").textContent = "Editar Usuário";
  document.getElementById("m-id").value = u.id;
  document.getElementById("m-username").value = u.username;
  document.getElementById("m-fullname").value = u.full_name;
  document.getElementById("m-email").value = u.email;
  document.getElementById("m-role").value = u.role;
  document.getElementById("m-active").value = u.active ? "1" : "0";
  document.getElementById("m-password").value = "";
  document.getElementById("m-username").disabled = true;
  document.getElementById("pw-group").style.display = "block";
  document.getElementById("pw-edit-note").style.display = "block";
  document.getElementById("active-group").style.display = "block";
  document.getElementById("modal").classList.add("open");
}

function closeModal() { document.getElementById("modal").classList.remove("open"); }

document.getElementById("m-confirm").addEventListener("click", async () => {
  const fullname  = document.getElementById("m-fullname").value.trim();
  const email     = document.getElementById("m-email").value.trim();
  const password  = document.getElementById("m-password").value;
  const role      = document.getElementById("m-role").value;
  const active    = document.getElementById("m-active").value === "1";

  if (!fullname || !email) { toast("Nome e e-mail são obrigatórios", "error"); return; }

  const btn = document.getElementById("m-confirm");
  btn.disabled = true; btn.textContent = "Salvando...";
  let res;

  if (!editMode) {
    const username = document.getElementById("m-username").value.trim();
    if (!username || !password) { toast("Usuário e senha obrigatórios", "error"); btn.disabled=false; btn.textContent="Salvar"; return; }
    res = await API.post("/users", { username, full_name: fullname, email, password, role });
  } else {
    const id = document.getElementById("m-id").value;
    const body = { full_name: fullname, email, role, active };
    if (password) body.password = password;
    res = await API.put(`/users/${id}`, body);
  }

  btn.disabled = false; btn.textContent = "Salvar";
  if (res?.error) { toast(res.error, "error"); return; }
  toast(editMode ? "Usuário atualizado!" : "Usuário criado!", "success");
  closeModal(); load();
});

function confirmDelete(id) {
  document.getElementById("del-id").value = id;
  document.getElementById("modal-del").classList.add("open");
}

document.getElementById("del-confirm").addEventListener("click", async () => {
  const id = document.getElementById("del-id").value;
  const res = await API.del(`/users/${id}`);
  document.getElementById("modal-del").classList.remove("open");
  if (res?.ok) { toast("Usuário excluído", "success"); load(); }
  else toast(res?.error || "Erro ao excluir", "error");
});

load();
</script>
</body>
</html>
