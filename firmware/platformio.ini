; PanicIoT — PlatformIO configuration
; ─────────────────────────────────────────────────────────────────
[env:esp32dev]
platform  = espressif32
board     = esp32dev
framework = arduino

; Monitor serial (115200 baud)
monitor_speed = 115200

; Dependências
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0
    ; WiFi, HTTPClient e Preferences já vêm no framework Arduino/ESP32

; Velocidade de upload
upload_speed = 921600

; Flags extras (opcional — melhora stack de mensagens de erro)
build_flags =
    -DCORE_DEBUG_LEVEL=1
